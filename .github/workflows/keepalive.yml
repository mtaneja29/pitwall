# Pings the Render backend every 10 minutes so the free-tier instance never
# hits its 15-minute sleep threshold. Without this, the first visitor after
# an idle period waits ~50s for a cold start. One always-awake service fits
# inside Render's 750 free instance-hours per month (~744h needed).
#
# Note: GitHub disables scheduled workflows after 60 days without repo
# activity — a push (or re-enabling in the Actions tab) revives it.
name: Keep backend awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: curl --silent --show-error --max-time 90 https://pitwall-9t5c.onrender.com/ || true
